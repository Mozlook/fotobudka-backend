x-app-common: &app-common
  user: "${LOCAL_UID:-1000}:${LOCAL_GID:-1000}"
  restart: unless-stopped
  env_file:
    - .env
  networks:
    - app
  volumes:
    - ./logs:/logs
  environment:
    API_ADDR: :8080
    SIEM_LOG_DIR: /logs
    REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
    CODE_LOGIN_ATTEMPTS_TTL: ${CODE_LOGIN_ATTEMPTS_TTL:-10m}
    CODE_LOGIN_CAPTCHA_THRESHOLD: ${CODE_LOGIN_CAPTCHA_THRESHOLD:-2}

services:
  api:
    <<: *app-common
    build:
      context: .
      dockerfile: Dockerfile
      target: api
    ports:
      - "${API_PORT:-8080}:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget -q -O - http://127.0.0.1:8080/healthz >/dev/null || exit 1",
        ]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 10s

  worker:
    <<: *app-common
    build:
      context: .
      dockerfile: Dockerfile
      target: worker
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      api:
        condition: service_healthy

  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - app
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 5s

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "no"]
    networks:
      - app
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 5s

volumes:
  postgres_data:

networks:
  app:
    driver: bridge
